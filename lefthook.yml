pre-commit:
  commands:
    fix-xml-spacing:
      glob: "*.md"
      run: python3 scripts/fix-xml-spacing.py {staged_files}
      stage_fixed: true
      priority: 0
    validate-skill-frontmatter:
      glob: "**/SKILL.md"
      run: python3 scripts/validate-skill-frontmatter.py {staged_files}
      priority: 5
    validate-plugins:
      glob: "*.json"
      run: python3 scripts/validate-plugins.py .
      priority: 10
    dprint:
      glob: "*.{md,python,ts,js,json,jsonc}"
      run: dprint fmt {staged_files}
      stage_fixed: true
      priority: 100
